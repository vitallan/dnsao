server:
  port: 0
  udpThreadPool: 1
  tcpThreadPool: 1
  webPort: -1

cache:
  enabled: true
  maxCacheEntries: 4
  rewarm: true
  secsBeforeTtlToRewarm: 1
  maxRewarmCount: 1
  alwaysRewarmTopEntries: 1
  keep:
    - "keep-threshold.com"

resolver:
  multiplier: 1
  upstreams:
    - ip: "127.0.0.1"
      port: 0
      protocol: "udp"
