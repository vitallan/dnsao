server:
  port: 0
  udpThreadPool: 10
  tcpThreadPool: 1
  webPort: -1

cache:
  enabled: false

resolver:
  multiplier: 3
  upstreamThreadPoolSize: 1
  upstreamQueueSize: 1
  upstreams:
    - ip: "127.0.0.1"
      port: 0
      protocol: "udp"
    - ip: "127.0.0.1"
      port: 0
      protocol: "udp"
    - ip: "127.0.0.1"
      port: 0
      protocol: "udp"
