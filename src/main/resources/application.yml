server:
  port: 8053
  webPort: 8044
  udpThreadPool: 20
  tcpThreadPool: 4
  httpThreadPool: 10

cache:
  enabled: true
  maxCacheEntries: 1000
  rewarm: true
  maxRewarmCount: 5

misc:
  timeout: 3
  dnssec: "simple"
  refreshLists: false
  blockingEnabled: true
  serveExpired: false

log:
  rootLevel: WARN
  dns: TRACE
  cache: WARN
  infra: WARN

resolver:
  multiplier: 3 #how many upstreams we will reach on each active remote query
  localMappings:
    - domain: "karpov"
      ip: "192.168.68.113"
    - domain: "cronicle.intranet"
      ip: "192.168.68.126"
