server:
  port: 53
  udpThreadPool: 10
  tcpThreadPool: 3
  webPort: 8044
  httpThreadPool: 10
  # Optional: persist metrics/query history to SQLite.
  # Parent directory must exist and be writable (DNSao will not create it).
  # statsDbPath: "/etc/dnsao/stats.db"

cache:
  enabled: true
  maxCacheEntries: 2048
  rewarm: true
  maxRewarmCount: 5
  maxRewarmPerMinute: 3000
  alwaysRewarmTopEntries: 1024

misc:
  timeout: 3
  refreshLists: false
  blockingEnabled: true
  serveExpired: false
  dnssec: off

resolver:
  tlsPoolSize: 5
  multiplier: 3
  upstreams:
    - ip: "1.1.1.1"
      port: 53
      protocol: "udp"
    - ip: "1.0.0.1"
      port: 53
      protocol: "udp"
    - ip: "8.8.8.8"
      port: 53
      protocol: "udp"
    - ip: "149.112.112.112"
      port: 53
      protocol: "udp"
    - ip: "9.9.9.9"
      port: 53
      protocol: "udp"
    - ip: "8.8.4.4"
      port: 53
      protocol: "udp" 

log:
  rootLevel: INFO
  dns: INFO
  cache: WARN
  infra: WARN
  file:
    path: "/var/log/dnsao/dnsao-%g.log"
    maxSize: 10485760
    maxFiles: 5

lists:
  blockLists:
    block: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
