server:
  port: 53
  udpThreadPool: 10
  tcpThreadPool: 3
  webPort: 8044
  httpThreadPool: 10
  # Optional: persist metrics/query history to SQLite.
  # Parent directory must exist and be writable (DNSao will not create it).
  # statsDbPath: "/etc/dnsao/stats.db"

cache:
  enabled: true
  maxCacheEntries: 2048
  rewarm: true
  maxRewarmCount: 5
  alwaysRewarmTopEntries: 1024

misc:
  timeout: 3
  queryLog: false
  refreshLists: true
  blockingEnabled: true
  serveExpired: false
  dnssec: simple

resolver:
  tlsPoolSize: 5
  multiplier: 1 
  upstreams:
    - ip: "1.1.1.1"
      port: 853
      protocol: "dot"
      tlsAuthName: "cloudflare-dns.com"
    - ip: "1.0.0.1"
      port: 853
      protocol: "dot"
      tlsAuthName: "cloudflare-dns.com"
    - ip: "149.112.112.112"
      port: 853
      protocol: "dot"
      tlsAuthName: "dns.quad9.net"
    - ip: "9.9.9.9"
      port: 853
      protocol: "dot"
      tlsAuthName: "dns.quad9.net"

  localMappings:

log:
  rootLevel: WARN
  dns: OFF
  cache: WARN
  infra: WARN
  file:
    path: "/var/log/dnsao/dnsao-%g.log"
    maxSize: 10485760
    maxFiles: 5

lists:
  blockLists:
    block: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
